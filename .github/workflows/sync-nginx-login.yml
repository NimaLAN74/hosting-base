# Sync nginx config to fix login: /auth/ and /resources/ must go to Keycloak on www.lianel.se.
# Run this when you cannot log in (login page shows React app or CSS/400 errors).
# Multiple jobs so you can re-run only the failing step from the Actions tab.
name: Sync Nginx (Fix Login)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate secrets and SSH connectivity. Re-run if connection fails.
  # ---------------------------------------------------------------------------
  validate-setup:
    name: "1. Validate & SSH preflight"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.REMOTE_HOST }}" ] || [ -z "${{ secrets.REMOTE_USER }}" ] || [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "❌ REMOTE_HOST, REMOTE_USER, SSH_PRIVATE_KEY must be set"
            exit 1
          fi
          echo "✅ Secrets configured"

      - name: Setup SSH
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH ready"

      - name: Preflight SSH (retry on timeout)
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
        run: |
          for i in 1 2 3 4 5; do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=45 -p ${REMOTE_PORT} ${REMOTE_USER}@${REMOTE_HOST} "echo ok"; then
              echo "✅ SSH reachable (attempt $i)"
              exit 0
            fi
            echo "⚠️ SSH attempt $i failed (timeout or refused); retrying in 30s..."
            [ $i -lt 5 ] && sleep 30
          done
          echo "❌ SSH to ${REMOTE_HOST} failed after 5 attempts."
          exit 1

  # ---------------------------------------------------------------------------
  # Job 2: Apply on remote (server git sync, Keycloak, KC_HOSTNAME, optional nginx reload).
  # Re-run if Keycloak or server config fix fails.
  # ---------------------------------------------------------------------------
  apply-remote:
    name: "2. Apply on remote (Keycloak + server config)"
    runs-on: ubuntu-latest
    needs: [validate-setup]
    permissions:
      contents: read
    steps:
      - name: Setup SSH
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Apply on remote (fix 502 - sync DB, Keycloak, KC_HOSTNAME, optional nginx reload)
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
        run: |
          set -e
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=30 \
            -p "${REMOTE_PORT}" \
            "${REMOTE_USER}@${REMOTE_HOST}" '
            set -e
            echo "=== 1. Get latest from git on server ==="
            REPO=""
            for base in /root/hosting-base /root /opt; do
              [ -f "$base/lianel/dc/docker-compose.infra.yaml" ] && REPO="$base" && break
              [ -f "$base/hosting-base/lianel/dc/docker-compose.infra.yaml" ] && REPO="$base/hosting-base" && break
            done
            if [ -n "$REPO" ]; then
              cd "$REPO" && git fetch origin 2>/dev/null; git checkout origin/master -- lianel/dc/nginx/config/nginx.conf lianel/dc/docker-compose.infra.yaml lianel/dc/docker-compose.oauth2-proxy.yaml 2>/dev/null || git checkout origin/main -- lianel/dc/nginx/config/nginx.conf lianel/dc/docker-compose.infra.yaml lianel/dc/docker-compose.oauth2-proxy.yaml 2>/dev/null || true
              echo "  Repo: $REPO"
            fi
            echo "=== 2. Nginx + compose into /root/lianel/dc ==="
            mkdir -p /root/lianel/dc/nginx/config
            for base in /root/hosting-base /root; do
              [ -f "$base/lianel/dc/nginx/config/nginx.conf" ] && cp "$base/lianel/dc/nginx/config/nginx.conf" /root/lianel/dc/nginx/config/ && break
              [ -f "$base/hosting-base/lianel/dc/nginx/config/nginx.conf" ] && cp "$base/hosting-base/lianel/dc/nginx/config/nginx.conf" /root/lianel/dc/nginx/config/ && break
            done
            for base in /root/hosting-base /root; do
              [ -f "$base/lianel/dc/docker-compose.infra.yaml" ] && cp "$base/lianel/dc/docker-compose.infra.yaml" /root/lianel/dc/ && break
              [ -f "$base/hosting-base/lianel/dc/docker-compose.infra.yaml" ] && cp "$base/hosting-base/lianel/dc/docker-compose.infra.yaml" /root/lianel/dc/ && break
            done
            for base in /root/hosting-base /root; do
              [ -f "$base/lianel/dc/docker-compose.oauth2-proxy.yaml" ] && cp "$base/lianel/dc/docker-compose.oauth2-proxy.yaml" /root/lianel/dc/ && break
              [ -f "$base/hosting-base/lianel/dc/docker-compose.oauth2-proxy.yaml" ] && cp "$base/hosting-base/lianel/dc/docker-compose.oauth2-proxy.yaml" /root/lianel/dc/ && break
            done
            echo "=== 3. Force KC_HOSTNAME in all compose copies ==="
            for d in /root/lianel/dc /root/hosting-base/lianel/dc; do
              [ -f "$d/docker-compose.infra.yaml" ] || continue
              sed -i "s|KC_HOSTNAME:.*|KC_HOSTNAME: https://www.lianel.se/auth|" "$d/docker-compose.infra.yaml"
              sed -i "s|KC_HOSTNAME_ADMIN:.*|KC_HOSTNAME_ADMIN: https://auth.lianel.se|" "$d/docker-compose.infra.yaml"
              grep -E "KC_HOSTNAME" "$d/docker-compose.infra.yaml" | head -2
            done
            echo "=== 4. Fix 502: sync Keycloak DB password (must match .env) and start Keycloak ==="
            RAN_DB_FIX=
            for repo in /root/hosting-base/lianel/dc /root/lianel/dc; do
              if [ -f "$repo/scripts/maintenance/set-keycloak-db-password-on-server.sh" ]; then
                echo "  Running set-keycloak-db-password from $repo ..."
                (cd "$repo" && bash scripts/maintenance/set-keycloak-db-password-on-server.sh) && RAN_DB_FIX=1 && break || echo "  (script failed or skipped; Keycloak may still fail to start)"
              fi
            done
            [ -z "$RAN_DB_FIX" ] && echo "  (set-keycloak-db-password script not found on server)"
            DC_DIR="/root/hosting-base/lianel/dc"
            [ -f /root/lianel/dc/docker-compose.infra.yaml ] && DC_DIR="/root/lianel/dc"
            KEYCOWNER=$(docker inspect keycloak --format "{{ index .Config.Labels \"com.docker.compose.project.working_dir\" }}" 2>/dev/null) || true
            [ -n "$KEYCOWNER" ] && [ -f "$KEYCOWNER/docker-compose.infra.yaml" ] && DC_DIR="$KEYCOWNER" || true
            echo "  Using compose dir: $DC_DIR"
            (cd "$DC_DIR" && docker compose -f docker-compose.infra.yaml up -d keycloak)
            echo "  Waiting 60s for Keycloak to start..."
            sleep 60
            echo "=== 5. Verify Keycloak is responding (fail job if not – root cause of 502) ==="
            # Keycloak health endpoints vary by version/config AND relative path (KC_HTTP_RELATIVE_PATH=/auth).
            # Accept any of these as "up":
            # - /auth/health/ready (Quarkus, when health enabled)
            # - /auth/health (some builds expose this)
            # - /auth/realms/master (legacy fallback; returns 200/302 when Keycloak is serving HTTP)
            KC_CODE=$(docker exec nginx-proxy curl -s -o /dev/null -w "%{http_code}" http://keycloak:8080/auth/health/ready 2>/dev/null || echo "000")
            if [ "$KC_CODE" = "404" ] || [ "$KC_CODE" = "000" ]; then
              KC_CODE=$(docker exec nginx-proxy curl -s -o /dev/null -w "%{http_code}" http://keycloak:8080/auth/health 2>/dev/null || echo "000")
            fi
            if [ "$KC_CODE" = "404" ] || [ "$KC_CODE" = "000" ]; then
              KC_CODE=$(docker exec nginx-proxy curl -s -o /dev/null -w "%{http_code}" http://keycloak:8080/auth/realms/master 2>/dev/null || echo "000")
            fi
            if [ "$KC_CODE" != "200" ] && [ "$KC_CODE" != "302" ] && [ "$KC_CODE" != "301" ]; then
              echo "  Keycloak health check returned HTTP $KC_CODE (expected 200/301/302). Keycloak may be down – login can return 502."
              echo "  Check: docker logs keycloak (often 'password authentication failed' → run set-keycloak-db-password-on-server.sh). See ROOT-CAUSE-LOGIN-AIRFLOW-KEYCLOAK.md"
              exit 1
            fi
            echo "  Keycloak is up (HTTP $KC_CODE)."
            echo "=== 6. Reload nginx (optional; job 3 deploys runner nginx.conf and reloads) ==="
            docker exec nginx-proxy nginx -t 2>/dev/null && docker exec nginx-proxy nginx -s reload 2>/dev/null || echo "  (nginx reload skipped)"
            echo "=== 6b. Restart oauth2-proxy (issuer mismatch can cause /oauth2/callback 500) ==="
            if [ -f "$DC_DIR/docker-compose.oauth2-proxy.yaml" ]; then
              (cd "$DC_DIR" && docker compose -f docker-compose.oauth2-proxy.yaml up -d oauth2-proxy) || echo "  (oauth2-proxy restart skipped)"
            fi
            echo "=== 7. Set realm frontendUrl (if Keycloak is up) ==="
            for dc in /root/hosting-base/lianel/dc /root/lianel/dc; do
              [ -f "$dc/scripts/keycloak-setup/fix-keycloak-https.sh" ] || continue
              (cd "$dc" && [ -f .env ] && source .env; export KEYCLOAK_URL=https://auth.lianel.se; export KEYCLOAK_FRONTEND_URL=https://www.lianel.se/auth; bash scripts/keycloak-setup/fix-keycloak-https.sh) 2>/dev/null && break || true
            done
            echo "=== 8. Fix frontend-client PKCE (Keycloak logs: Missing parameter code_challenge_method) ==="
            for dc in /root/hosting-base/lianel/dc /root/lianel/dc; do
              if [ -f "$dc/scripts/keycloak-setup/update-frontend-client-no-pkce-required.sh" ] && [ -f "$dc/.env" ]; then
                (cd "$dc" && source .env; export KEYCLOAK_URL=https://auth.lianel.se; bash scripts/keycloak-setup/update-frontend-client-no-pkce-required.sh) 2>/dev/null && echo "  frontend-client PKCE set to not required" && break || echo "  (script failed or skipped)"
              fi
            done
            docker ps --filter name=keycloak --format "table {{.Names}}\t{{.Status}}"
            echo "✅ Remote apply done"
          '
          echo "✅ Apply on remote done"

  # ---------------------------------------------------------------------------
  # Job 3: Copy nginx.conf from runner to server and reload. Runs AFTER apply-remote so Keycloak is up first.
  # ---------------------------------------------------------------------------
  copy-nginx:
    name: "3. Copy nginx.conf and reload"
    runs-on: ubuntu-latest
    needs: [validate-setup, apply-remote]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy nginx.conf to server and reload
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
        run: |
          set -e
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -P "${REMOTE_PORT}" \
            lianel/dc/nginx/config/nginx.conf "${REMOTE_USER}@${REMOTE_HOST}:/tmp/nginx.conf"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "mkdir -p /root/lianel/dc/nginx/config /root/hosting-base/lianel/dc/nginx/config && \
             cp /tmp/nginx.conf /root/lianel/dc/nginx/config/nginx.conf && \
             cp /tmp/nginx.conf /root/hosting-base/lianel/dc/nginx/config/nginx.conf && \
             docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload && \
             echo '✅ Nginx reloaded'"
          echo "✅ Runner nginx.conf deployed and reloaded"

  # ---------------------------------------------------------------------------
  # Job 4: Assert login page is not 502. FAIL workflow if auth still returns 502 (so we never report success when login is broken).
  # ---------------------------------------------------------------------------
  assert-login-not-502:
    name: "4. Assert login not 502"
    runs-on: ubuntu-latest
    needs: [copy-nginx]
    steps:
      - name: Fail if login returns 502
        run: |
          echo "Checking https://www.lianel.se/auth/ ..."
          sleep 10
          CODE=$(curl -s -k -o /dev/null -w "%{http_code}" "https://www.lianel.se/auth/realms/lianel/protocol/openid-connect/auth?client_id=frontend-client&redirect_uri=https%3A%2F%2Fwww.lianel.se%2F&response_type=code&scope=openid" -L 2>/dev/null || echo "000")
          if [ "$CODE" = "502" ]; then
            echo "Login page returns 502 – auth is still broken. Keycloak may be down or nginx cannot reach it."
            echo "On server: docker logs keycloak; see ROOT-CAUSE-LOGIN-AIRFLOW-KEYCLOAK.md"
            exit 1
          fi
          echo "Login page returned HTTP $CODE (502 would fail the job)."

  # ---------------------------------------------------------------------------
  # Job 5: Verify theme CSS. Best-effort; does not fail workflow.
  # ---------------------------------------------------------------------------
  verify-theme-css:
    name: "5. Verify theme CSS"
    runs-on: ubuntu-latest
    needs: [copy-nginx]
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify theme CSS (200 + text/css)
        run: |
          echo "Waiting 15s for Keycloak to be ready..."
          sleep 15
          for attempt in 1 2 3; do
            echo "Theme CSS verification attempt $attempt..."
            if bash lianel/dc/scripts/monitoring/verify-keycloak-www-resources.sh; then
              echo "✅ Theme CSS OK"
              exit 0
            fi
            [ $attempt -lt 3 ] && echo "Retry in 20s..." && sleep 20
          done
          echo "⚠️ Theme CSS not 200/text/css after 3 attempts (Keycloak may still be starting or theme path changed); nginx sync was still applied."
          exit 1

  # ---------------------------------------------------------------------------
  # Job 6: Verify /auth/ goes to Keycloak. Informational.
  # ---------------------------------------------------------------------------
  verify-auth:
    name: "6. Verify /auth/ → Keycloak"
    runs-on: ubuntu-latest
    needs: [copy-nginx]
    continue-on-error: true
    steps:
      - name: Verify /auth/ goes to Keycloak
        run: |
          echo "Waiting 5s for nginx/Keycloak..."
          sleep 5
          SIZE=$(curl -s -k -o /tmp/auth_check.html -w "%{size_download}" "https://www.lianel.se/auth/realms/lianel/protocol/openid-connect/auth?client_id=frontend-client&redirect_uri=https%3A%2F%2Fwww.lianel.se%2F&response_type=code&scope=openid" -L 2>/dev/null || echo "0")
          if [ "$SIZE" -gt 5000 ] 2>/dev/null; then
            echo "✅ Login page looks like Keycloak (response size ${SIZE} bytes)"
          elif [ "$SIZE" -gt 0 ]; then
            echo "⚠️ Response size ${SIZE} bytes (expected >5000 for Keycloak HTML)"
          else
            echo "⚠️ Could not reach www.lianel.se (curl failed or 0 bytes)"
          fi

  # ---------------------------------------------------------------------------
  # Job 7: E2E login flow test. Best-effort; does not fail workflow.
  # ---------------------------------------------------------------------------
  e2e-login:
    name: "7. E2E login flow"
    runs-on: ubuntu-latest
    needs: [copy-nginx]
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run E2E login flow test
        run: |
          echo "Waiting 20s for Keycloak to serve new hostname..."
          sleep 20
          for attempt in 1 2 3; do
            echo "E2E attempt $attempt..."
            if bash lianel/dc/scripts/monitoring/e2e-test-www-login-flow.sh; then
              echo "✅ E2E login flow passed"
              exit 0
            fi
            [ $attempt -lt 3 ] && echo "Retry in 15s..." && sleep 15
          done
          echo "⚠️ E2E failed after 3 attempts; nginx sync was still applied."
          exit 1

  # ---------------------------------------------------------------------------
  # Job 8: Summary. Runs after all jobs; reports status for each step.
  # ---------------------------------------------------------------------------
  summary:
    name: "8. Summary"
    runs-on: ubuntu-latest
    needs: [validate-setup, apply-remote, copy-nginx, assert-login-not-502, verify-theme-css, verify-auth, e2e-login]
    if: always() && !cancelled()
    steps:
      - name: Summary
        run: |
          echo "## Sync Nginx (Fix Login)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1. Validate & SSH preflight | ${{ needs.validate-setup.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2. Apply on remote (Keycloak) | ${{ needs.apply-remote.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3. Copy nginx.conf and reload | ${{ needs.copy-nginx.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4. Assert login not 502 | ${{ needs.assert-login-not-502.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 5. Verify theme CSS | ${{ needs.verify-theme-css.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 6. Verify /auth/ → Keycloak | ${{ needs.verify-auth.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 7. E2E login flow | ${{ needs.e2e-login.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Nginx**: \`/auth/\`, \`/realms/\`, \`/resources/\` on www → Keycloak" >> $GITHUB_STEP_SUMMARY
          echo "- **Next**: Open https://www.lianel.se in a **new tab** and log in." >> $GITHUB_STEP_SUMMARY
