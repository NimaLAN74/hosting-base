name: Deploy Profile Service to Production

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'lianel/dc/profile-service/**'
      - 'lianel/dc/docker-compose.backend.yaml'
      - 'lianel/dc/docker-compose.yaml'
      - 'lianel/dc/nginx/config/nginx.conf'
      - 'lianel/dc/scripts/deployment/deploy-profile-service.sh'
      - '.github/workflows/deploy-profile-service.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build and push image. Re-run only if build/push fails.
  # ---------------------------------------------------------------------------
  build:
    name: "1. Build & push image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        id: image-name
        run: |
          IMAGE_NAME_LC=$(echo "${{ github.repository }}/lianel-profile-service" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${IMAGE_NAME_LC}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME_LC=${IMAGE_NAME_LC}" >> $GITHUB_ENV
          echo "✅ Image: ${IMAGE_NAME_LC}:latest"

      - name: Set image tag for downstream jobs
        id: image-tag
        run: |
          echo "image_tag=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./lianel/dc/profile-service
          file: ./lianel/dc/profile-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        if: success()
        run: |
          PACKAGE_NAME="${{ steps.image-name.outputs.image_name }}"
          PACKAGE_NAME_ENCODED=$(echo "$PACKAGE_NAME" | sed 's/\//%2F/g')
          if gh api -X PATCH "/user/packages/container/${PACKAGE_NAME_ENCODED}" -f visibility=public 2>&1; then
            echo "✅ Package public (user)"
          else
            ORG_NAME=$(echo "$PACKAGE_NAME" | cut -d'/' -f1)
            PACKAGE_PATH=$(echo "$PACKAGE_NAME" | cut -d'/' -f2-)
            PACKAGE_PATH_ENC=$(echo "$PACKAGE_PATH" | sed 's/\//%2F/g')
            if gh api -X PATCH "/orgs/${ORG_NAME}/packages/container/${PACKAGE_PATH_ENC}" -f visibility=public 2>&1; then
              echo "✅ Package public (org)"
            else
              echo "⚠️ Make package public manually: https://github.com/NimaLAN74?tab=packages"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to server (validate secrets, SSH, copy script, run deploy).
  # Re-run if server connection or deploy fails.
  # ---------------------------------------------------------------------------
  deploy:
    name: "2. Deploy to server"
    runs-on: ubuntu-latest
    needs: build
    env:
      REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          [ -n "${{ secrets.REMOTE_HOST }}" ] || { echo "❌ REMOTE_HOST not set"; exit 1; }
          [ -n "${{ secrets.REMOTE_USER }}" ] || { echo "❌ REMOTE_USER not set"; exit 1; }
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] || { echo "❌ SSH_PRIVATE_KEY not set"; exit 1; }
          echo "✅ Secrets present"

      - name: Setup SSH key
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          [ -s ~/.ssh/deploy_key ] || { echo "❌ SSH key empty"; exit 1; }
          grep -q "^-----BEGIN" ~/.ssh/deploy_key || { echo "❌ SSH key format"; exit 1; }
          grep -q "^ssh-ed25519 " ~/.ssh/deploy_key && { echo "❌ Use private key, not public"; exit 1; } || true
          ssh-keyscan -H "$REMOTE_HOST" -p "${REMOTE_PORT}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH key ready"

      - name: Copy deployment script to remote
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
        run: |
          SCRIPT_PATH="lianel/dc/scripts/deployment/deploy-profile-service.sh"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "❌ Local script missing: $SCRIPT_PATH"
            exit 1
          fi
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -P "${REMOTE_PORT}" \
            "$SCRIPT_PATH" \
            "${REMOTE_USER}@${REMOTE_HOST}:/root/deploy-profile-service.sh" || { echo "❌ scp failed"; exit 1; }
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -p "${REMOTE_PORT}" \
            "${REMOTE_USER}@${REMOTE_HOST}" \
            "chmod +x /root/deploy-profile-service.sh && test -x /root/deploy-profile-service.sh && echo '✅ Script copied and executable'"
          echo "✅ Deployment script ready on remote"

      - name: Run deploy on remote
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          ACTOR='${{ github.actor }}'
          if [ -z "$IMAGE_TAG" ]; then
            echo "❌ needs.build.outputs.image_tag is empty — build job may not have exported image_tag"
            exit 1
          fi
          echo "Deploying: $IMAGE_TAG"
          # Avoid embedding token/tag in one SSH string — quotes/special chars break the remote shell.
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=60 \
            -p "${REMOTE_PORT}" \
            "${REMOTE_USER}@${REMOTE_HOST}" \
            bash -s <<EOF
          export GITHUB_TOKEN=$(printf '%q' "$GITHUB_TOKEN")
          export GITHUB_ACTOR=$(printf '%q' "$ACTOR")
          exec /root/deploy-profile-service.sh $(printf '%q' "$IMAGE_TAG")
          EOF
          echo "✅ Deploy finished"

  # ---------------------------------------------------------------------------
  # Job 3: Sync nginx config to remote and reload. Re-run if nginx sync fails.
  # ---------------------------------------------------------------------------
  sync-nginx:
    name: "3. Sync nginx config"
    runs-on: ubuntu-latest
    needs: deploy
    env:
      REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          [ -n "${{ secrets.REMOTE_HOST }}" ] || { echo "❌ REMOTE_HOST not set"; exit 1; }
          [ -n "${{ secrets.REMOTE_USER }}" ] || { echo "❌ REMOTE_USER not set"; exit 1; }
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] || { echo "❌ SSH_PRIVATE_KEY not set"; exit 1; }
          echo "✅ Secrets present"

      - name: Setup SSH key
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          [ -s ~/.ssh/deploy_key ] || { echo "❌ SSH key empty"; exit 1; }
          ssh-keyscan -H "$REMOTE_HOST" -p "${REMOTE_PORT}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH key ready"

      - name: Sync nginx config and reload
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            -P "${REMOTE_PORT}" \
            lianel/dc/nginx/config/nginx.conf "${REMOTE_USER}@${REMOTE_HOST}:/tmp/nginx.conf"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "mkdir -p /root/lianel/dc/nginx/config /root/hosting-base/lianel/dc/nginx/config; for d in /root/lianel/dc/nginx/config /root/hosting-base/lianel/dc/nginx/config; do [ -d \"\$d\" ] && cp /tmp/nginx.conf \"\$d/\" && echo \"Updated \$d\"; done; docker exec nginx-proxy nginx -t 2>/dev/null && docker exec nginx-proxy nginx -s reload 2>/dev/null && echo '✅ Nginx reloaded' || echo '⚠️ Nginx reload skipped'"
          echo "✅ Nginx config synced"

  # ---------------------------------------------------------------------------
  # Job 4: Summary. Runs after build, deploy, sync-nginx; re-run failed jobs from Actions tab.
  # ---------------------------------------------------------------------------
  summary:
    name: "4. Summary"
    runs-on: ubuntu-latest
    needs: [build, deploy, sync-nginx]
    if: always() && !cancelled()
    steps:
      - name: Deployment summary
        run: |
          echo "## 🚀 Profile Service deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1. Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2. Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3. Sync nginx | ${{ needs.sync-nginx.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ needs.build.outputs.image_tag || 'N/A' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: linux/amd64 | **Language**: Rust" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed to**: \`${{ secrets.REMOTE_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Re-run only the **failed job** from the Actions tab to retry without re-running others." >> $GITHUB_STEP_SUMMARY
