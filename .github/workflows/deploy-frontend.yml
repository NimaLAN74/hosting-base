# Frontend pipeline: 1) Build image  2) Deploy to server  3) Verify  4) E2E (optional).
# When a job fails, use Actions → "Re-run failed jobs" to retry only that job (e.g. only "2. Deploy").
name: Deploy Frontend to Production

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'lianel/dc/frontend/**'
      - 'lianel/dc/docker-compose.frontend.yaml'
      - 'lianel/dc/docker-compose.yaml'
      - 'lianel/dc/docker-compose.infra.yaml'
      - 'lianel/dc/scripts/deployment/deploy-frontend.sh'
      - 'lianel/dc/nginx/**'
      - 'lianel/dc/monitoring/grafana/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build and push image. Re-run this only if build/push fails.
  # ---------------------------------------------------------------------------
  build:
    name: "1. Build & push image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pipeline context
        run: |
          echo "## Pipeline context" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | \`${{ github.workflow }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Set image name and tag
        id: image-name
        run: |
          IMAGE_NAME_LC=$(echo "${{ github.repository }}/lianel-frontend" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${IMAGE_NAME_LC}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME_LC=${IMAGE_NAME_LC}" >> $GITHUB_ENV
          echo "✅ Image: ${IMAGE_NAME_LC}:latest"

      - name: Set image tag for downstream jobs
        id: image-tag
        run: |
          echo "image_tag=${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}:latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./lianel/dc/frontend
          file: ./lianel/dc/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_KEYCLOAK_URL=https://auth.lianel.se
            REACT_APP_KEYCLOAK_REALM=lianel
            REACT_APP_KEYCLOAK_CLIENT_ID=frontend-client
            REACT_APP_GRAFANA_URL=https://monitoring.lianel.se
            REACT_APP_AIRFLOW_URL=https://airflow.lianel.se
            REACT_APP_FRONTEND_URL=https://www.lianel.se
            REACT_APP_DOMAIN_MAIN=www.lianel.se
            REACT_APP_DOMAIN_ALT=lianel.se
            REACT_APP_DOMAIN_AUTH=auth.lianel.se
            REACT_APP_DOMAIN_MONITORING=monitoring.lianel.se
            REACT_APP_DOMAIN_AIRFLOW=airflow.lianel.se
            REACT_APP_OAUTH2_PROXY_CLIENT_ID=oauth2-proxy

      - name: Make package public
        if: success()
        run: |
          PACKAGE_NAME="${{ steps.image-name.outputs.image_name }}"
          PACKAGE_NAME_ENCODED=$(echo "$PACKAGE_NAME" | sed 's/\//%2F/g')
          if gh api -X PATCH "/user/packages/container/${PACKAGE_NAME_ENCODED}" -f visibility=public 2>&1; then
            echo "✅ Package public (user)"
          else
            ORG_NAME=$(echo "$PACKAGE_NAME" | cut -d'/' -f1)
            PACKAGE_PATH=$(echo "$PACKAGE_NAME" | cut -d'/' -f2-)
            PACKAGE_PATH_ENC=$(echo "$PACKAGE_PATH" | sed 's/\//%2F/g')
            if gh api -X PATCH "/orgs/${ORG_NAME}/packages/container/${PACKAGE_PATH_ENC}" -f visibility=public 2>&1; then
              echo "✅ Package public (org)"
            else
              echo "⚠️ Make package public manually: https://github.com/NimaLAN74?tab=packages"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to server (SSH, copy, run script, nginx, keycloak fix).
  # Re-run this if server connection or deploy fails.
  # ---------------------------------------------------------------------------
  deploy:
    name: "2. Deploy to server"
    runs-on: ubuntu-latest
    needs: build
    env:
      REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          [ -n "${{ secrets.REMOTE_HOST }}" ] || { echo "❌ REMOTE_HOST not set"; exit 1; }
          [ -n "${{ secrets.REMOTE_USER }}" ] || { echo "❌ REMOTE_USER not set"; exit 1; }
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] || { echo "❌ SSH_PRIVATE_KEY not set"; exit 1; }
          echo "✅ Secrets present"

      - name: Setup SSH key
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          [ -s ~/.ssh/deploy_key ] || { echo "❌ SSH key empty"; exit 1; }
          grep -q "^-----BEGIN" ~/.ssh/deploy_key || { echo "❌ SSH key format"; exit 1; }
          grep -q "^ssh-ed25519 " ~/.ssh/deploy_key && { echo "❌ Use private key, not public"; exit 1; } || true
          ssh-keyscan -H "$REMOTE_HOST" -p "${REMOTE_PORT}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH key ready"

      - name: Test SSH connection (with retries)
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          for i in 1 2 3 4 5; do
            echo "SSH attempt $i/5..."
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ConnectTimeout=25 -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" "echo OK; hostname"; then
              echo "✅ SSH OK"
              exit 0
            fi
            [ $i -lt 5 ] && sleep 5
          done
          echo "❌ SSH failed after 5 attempts. Check REMOTE_HOST, REMOTE_PORT, SSH key, firewall."
          exit 1

      - name: Copy deploy script to remote
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=25 -P "${REMOTE_PORT}" \
            lianel/dc/scripts/deployment/deploy-frontend.sh "${REMOTE_USER}@${REMOTE_HOST}:/root/deploy-frontend.sh"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" "chmod +x /root/deploy-frontend.sh"
          echo "✅ Script copied"

      - name: Run deploy on remote (pull image, recreate container)
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || '22' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          ACTOR='${{ github.actor }}'
          if [ -z "$IMAGE_TAG" ]; then
            echo "❌ needs.build.outputs.image_tag is empty"
            exit 1
          fi
          # Keepalives: long docker pull can idle the SSH channel → broken pipe without ServerAlive*.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -o TCPKeepAlive=yes \
            -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" \
            bash -s <<EOF
          export GITHUB_TOKEN=$(printf '%q' "$GITHUB_TOKEN")
          export GITHUB_ACTOR=$(printf '%q' "$ACTOR")
          exec /root/deploy-frontend.sh $(printf '%q' "$IMAGE_TAG")
          EOF
          echo "✅ Deploy finished"

      - name: Sync nginx config to remote
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "mkdir -p /root/lianel/dc/nginx/config /root/hosting-base/lianel/dc/nginx/config"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -P "${REMOTE_PORT}" \
            lianel/dc/nginx/config/nginx.conf "${REMOTE_USER}@${REMOTE_HOST}:/root/lianel/dc/nginx/config/nginx.conf"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -P "${REMOTE_PORT}" \
            lianel/dc/nginx/config/nginx.conf "${REMOTE_USER}@${REMOTE_HOST}:/root/hosting-base/lianel/dc/nginx/config/nginx.conf"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "docker exec nginx-proxy nginx -t 2>/dev/null && docker exec nginx-proxy nginx -s reload 2>/dev/null && echo '✅ Nginx reloaded' || echo '⚠️ Nginx reload skipped'"
          echo "✅ Nginx synced"

      - name: Apply Keycloak redirect fix on remote
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -P "${REMOTE_PORT}" \
            lianel/dc/docker-compose.infra.yaml lianel/dc/nginx/config/nginx.conf lianel/dc/scripts/fix-502-keycloak-on-server.sh \
            "${REMOTE_USER}@${REMOTE_HOST}:/tmp/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "for d in /root/lianel/dc /root/hosting-base/lianel/dc; do [ -d \"\$d\" ] && cp /tmp/docker-compose.infra.yaml \"\$d/\" && mkdir -p \"\$d/nginx/config\" \"\$d/scripts\" && cp /tmp/nginx.conf \"\$d/nginx/config/\" && cp /tmp/fix-502-keycloak-on-server.sh \"\$d/scripts/\" && chmod +x \"\$d/scripts/fix-502-keycloak-on-server.sh\" && echo \"Updated \$d\"; done; bash /tmp/fix-502-keycloak-on-server.sh 2>&1"
          echo "✅ Keycloak fix applied"

      - name: Sync Grafana config and restart Grafana
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -P "${REMOTE_PORT}" \
            lianel/dc/monitoring/grafana/grafana.ini "${REMOTE_USER}@${REMOTE_HOST}:/tmp/grafana.ini"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "mkdir -p /root/lianel/dc/monitoring/grafana /root/hosting-base/lianel/dc/monitoring/grafana && for d in /root/lianel/dc /root/hosting-base/lianel/dc; do [ -d \"\$d\" ] && cp /tmp/grafana.ini \"\$d/monitoring/grafana/grafana.ini\" && echo \"Updated \$d/monitoring/grafana/grafana.ini\"; done; docker restart grafana 2>/dev/null && echo '✅ Grafana restarted' || echo '⚠️ Grafana restart skipped (container may not exist)'"
          echo "✅ Grafana config synced (auth_url=www.lianel.se/auth for cookie path)"

      - name: Run E2E checks on server (logs, login flow, watchlist, Grafana auth_url)
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -P "${REMOTE_PORT}" \
            lianel/dc/scripts/monitoring/e2e-server-full-analysis.sh "${REMOTE_USER}@${REMOTE_HOST}:/tmp/e2e-server-full-analysis.sh"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "chmod +x /tmp/e2e-server-full-analysis.sh && bash /tmp/e2e-server-full-analysis.sh" || echo "⚠️ E2E server checks had failures (deploy still succeeded)"
        continue-on-error: true

      - name: Run Keycloak redirect scripts on remote
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -P "${REMOTE_PORT}" \
            lianel/dc/scripts/keycloak-setup/fix-keycloak-https.sh lianel/dc/scripts/keycloak-setup/update-keycloak-frontend-client.sh \
            "${REMOTE_USER}@${REMOTE_HOST}:/tmp/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -p "${REMOTE_PORT}" "${REMOTE_USER}@${REMOTE_HOST}" \
            "export KEYCLOAK_ADMIN_PASSWORD='${KEYCLOAK_ADMIN_PASSWORD}'; export APP_FRONTEND_URL=https://www.lianel.se; cd /root/lianel/dc 2>/dev/null || cd /root/hosting-base/lianel/dc; bash /tmp/fix-keycloak-https.sh 2>&1; bash /tmp/update-keycloak-frontend-client.sh 2>&1"
          echo "✅ Keycloak scripts done"
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Job 3: Verify main page and auth URL. Re-run if verification fails.
  # ---------------------------------------------------------------------------
  verify:
    name: "3. Verify (main + auth)"
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Verify main page and auth URL
        run: |
          URL="${FRONTEND_URL:-https://www.lianel.se}"
          AUTH_URL="${URL}/auth/realms/lianel/protocol/openid-connect/auth?client_id=frontend-client&redirect_uri=${URL}/&response_type=code&scope=openid&prompt=login"
          echo "Checking main: $URL"
          HTTP_MAIN=$(curl -sSf -o /dev/null -w "%{http_code}" --connect-timeout 15 --max-time 30 "$URL/" 2>/dev/null || echo "000")
          [ -z "$HTTP_MAIN" ] || [ "$HTTP_MAIN" = "000" ] && { echo "❌ Main unreachable"; exit 1; }
          [ "$HTTP_MAIN" -ge 200 ] && [ "$HTTP_MAIN" -lt 400 ] || { echo "❌ Main HTTP $HTTP_MAIN"; exit 1; }
          echo "Main: $HTTP_MAIN"
          echo "Checking auth (retries for transient 502)..."
          HTTP_AUTH=""
          for i in 1 2 3 4 5 6 7 8; do
            HTTP_AUTH=$(curl -sSf -o /dev/null -w "%{http_code}" --connect-timeout 15 --max-time 30 "$AUTH_URL" 2>/dev/null || echo "000")
            echo "  attempt $i: Auth $HTTP_AUTH"
            [ "$HTTP_AUTH" != "502" ] && [ "$HTTP_AUTH" != "000" ] && break
            [ $i -lt 8 ] && sleep 5
          done
          [ "$HTTP_AUTH" = "502" ] && { echo "❌ Auth 502 after retries — run fix-502-keycloak-on-server.sh on server"; exit 1; }
          [ "$HTTP_AUTH" = "000" ] && { echo "❌ Auth unreachable"; exit 1; }
          echo "✅ Main $HTTP_MAIN, Auth $HTTP_AUTH"
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://www.lianel.se' }}

  # ---------------------------------------------------------------------------
  # Job 4: E2E stock service. Optional; failure does not fail workflow.
  # ---------------------------------------------------------------------------
  e2e:
    name: "4. E2E Stock Service"
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run E2E stock service routes
        run: bash lianel/dc/scripts/monitoring/e2e-stock-service-routes.sh
        env:
          BASE_URL: ${{ vars.FRONTEND_URL || 'https://www.lianel.se' }}
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Summary (runs after verify so we have a clear success point).
  # ---------------------------------------------------------------------------
  summary:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: [build, deploy, verify]
    if: always() && !cancelled()
    steps:
      - name: Deployment summary
        run: |
          echo "## 🚀 Frontend deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1. Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2. Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3. Verify | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ needs.build.outputs.image_tag || 'N/A' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Re-run only the **failed job** from the Actions tab to retry without re-running others." >> $GITHUB_STEP_SUMMARY
