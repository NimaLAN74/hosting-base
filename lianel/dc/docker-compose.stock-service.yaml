# Stock service (minimal: SSO verification, IBKR OAuth). No DB.
# Nginx: /api/v1/stock-service/ -> this backend. UI: main frontend at /stock.
# IBKR: place PEM files in ./stock-service-ibkr/ on the host; they appear at /app/ibkr-conf/ in the container.
services:
  stock-service:
    image: ghcr.io/nimalan74/hosting-base/lianel-stock-service:latest
    container_name: lianel-stock-service
    env_file:
      - .env
    environment:
      PORT: 3003
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://auth.lianel.se}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-lianel}
      KEYCLOAK_ISSUER_ALT: ${KEYCLOAK_ISSUER_ALT:-https://www.lianel.se/auth/realms/lianel}
      # Optional: IBKR OAuth (see .env.example). Paths are inside the container.
      IBKR_OAUTH_CONSUMER_KEY: ${IBKR_OAUTH_CONSUMER_KEY:-}
      IBKR_OAUTH_ACCESS_TOKEN: ${IBKR_OAUTH_ACCESS_TOKEN:-}
      IBKR_OAUTH_ACCESS_TOKEN_SECRET: ${IBKR_OAUTH_ACCESS_TOKEN_SECRET:-}
      IBKR_OAUTH_REALM: ${IBKR_OAUTH_REALM:-test_realm}
      IBKR_OAUTH_DH_PARAM_PATH: ${IBKR_OAUTH_DH_PARAM_PATH:-/app/ibkr-conf/dhparam.pem}
      IBKR_OAUTH_PRIVATE_ENCRYPTION_KEY_PATH: ${IBKR_OAUTH_PRIVATE_ENCRYPTION_KEY_PATH:-/app/ibkr-conf/private_encryption.pem}
      IBKR_OAUTH_PRIVATE_SIGNATURE_KEY_PATH: ${IBKR_OAUTH_PRIVATE_SIGNATURE_KEY_PATH:-/app/ibkr-conf/private_signature.pem}
      # When using Client Portal Gateway: set base URL, skip TLS verify, and (after browser login) session cookie
      IBKR_API_BASE_URL: ${IBKR_API_BASE_URL:-https://api.ibkr.com/v1/api}
      IBKR_INSECURE_SKIP_TLS_VERIFY: ${IBKR_INSECURE_SKIP_TLS_VERIFY:-false}
      IBKR_GATEWAY_SESSION_COOKIE: ${IBKR_GATEWAY_SESSION_COOKIE:-}
      IBKR_GATEWAY_SESSION_COOKIE_FILE: ${IBKR_GATEWAY_SESSION_COOKIE_FILE:-/app/ibkr-cookie/cookie.txt}
      RUST_LOG: info
    volumes:
      - ./stock-service-ibkr:/app/ibkr-conf:ro
      - ./stock-service-cookie:/app/ibkr-cookie
    expose:
      - "3003"
    restart: unless-stopped
    networks:
      - lianel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  lianel-network:
    external: true
