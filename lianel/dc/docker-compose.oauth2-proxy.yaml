services:
  # Keycloak is defined in docker-compose.infra.yaml - do not duplicate here
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    # Force PKCE via CLI; OAUTH2_PROXY_CODE_CHALLENGE_METHOD env can be ignored in some versions (oauth2-proxy#1852)
    command: ["--code-challenge-method=S256"]
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      # OAUTH2_PROXY_REDIRECT_URL not set - will use request host dynamically
      # Must match Keycloak discovery issuer (www proxy); auth.lianel.se redirects to www.lianel.se/auth
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OAUTH2_PROXY_OIDC_ISSUER_URL:-https://www.lianel.se/auth/realms/lianel}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_DOMAIN: .lianel.se
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: static://200
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_WHITELIST_DOMAINS: .lianel.se
      OAUTH2_PROXY_COOKIE_REFRESH: 1h
      OAUTH2_PROXY_COOKIE_EXPIRE: 4h
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_USER_ID_CLAIM: "preferred_username"
      OAUTH2_PROXY_OIDC_GROUPS_CLAIM: "groups"
      # BACKEND_LOGOUT_URL removed - using front-channel logout instead
      # Frontend will redirect to Keycloak logout endpoint directly
      # OAuth2-proxy clears its own session cookie
      # Keycloak handles logout via browser redirect (front-channel logout)
    expose:
      - "4180"
    restart: unless-stopped
    networks:
      - lianel-network

networks:
  lianel-network:
    external: true
